name: Release CLI binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_suffix: .exe
            artifact: elixcee-x86_64-windows.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_suffix: ""
            artifact: elixcee-x86_64-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_suffix: ""
            artifact: elixcee-aarch64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --bin elixcee --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: cp target/${{ matrix.target }}/release/elixcee${{ matrix.bin_suffix }} ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
